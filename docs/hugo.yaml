baseURL: https://abegong.github.io/katalyst/
locale: en-us
title: Katalyst Documentation
theme: github.com/alex-shpak/hugo-book
cleanDestinationDir: true
enableGitInfo: true
outputFormats:
  print:
    mediaType: text/html
    baseName: print/index
    isHTML: true
    notAlternative: true
outputs:
  home:
    - html
    - print
module:
  imports:
    - path: github.com/alex-shpak/hugo-book
params:
  BookTheme: auto
  BookSection: "*"
  BookSearch: true
markup:
  goldmark:
    renderer:
      unsafe: true
    tableOfContents:
      startLevel: 1
