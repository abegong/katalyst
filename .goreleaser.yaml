# GoReleaser configuration for Katalyst.
# Docs: https://goreleaser.com
version: 2

project_name: katalyst

before:
  hooks:
    - go mod tidy

builds:
  - id: katalyst
    main: .
    binary: katalyst
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/abegong/katalyst/cmd.Version={{ .Version }}

archives:
  - id: katalyst
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
