# GoReleaser configuration for Katalyst.
# Docs: https://goreleaser.com
version: 2

project_name: katalyst

before:
  hooks:
    - go mod tidy
    # Package the product skills into bin/*.skill so they can be attached to the
    # Release below. Same target maintainers run locally, so packaging matches.
    - make skills

builds:
  - id: katalyst
    main: .
    binary: katalyst
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/abegong/katalyst/cmd.Version={{ .Version }}

archives:
  - id: katalyst
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  draft: false
  prerelease: auto
  header: |
    First public Katalyst release.
  extra_files:
    - glob: ./bin/*.skill
