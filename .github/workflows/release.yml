name: release

# Builds cross-platform binaries and publishes a GitHub Release whenever a
# v* tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the changelog can be generated
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
