name: preview-docs

# Builds the Hugo docs for each PR and deploys them to Netlify as a per-PR
# "deploy-preview-<N>" alias, then posts the preview URL on the PR.
#
# Production Pages is published separately (Settings > Pages Source: "GitHub
# Actions"). A GitHub-Actions-sourced Pages site serves a single site and can't
# host per-PR subpath previews, so previews live on Netlify instead.
#
# Requires repo secrets NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID, plus the repo
# variable NETLIFY_SITE_NAME (the "<name>.netlify.app" subdomain) used to build
# the preview baseURL. The alias is deterministic, so HUGO_BASEURL is set before
# the deploy; keep it in sync with the --alias flag below.

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write  # post/update the preview-link comment

# One preview deploy per PR; newer pushes supersede in-flight builds.
concurrency:
  group: preview-docs-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    # Skip forks: a pull_request from a fork can't read the Netlify secrets.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'   # match the go directive in go.mod
          cache: true
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.3'
          extended: true
      - name: Build docs with the Netlify preview baseURL
        env:
          HUGO_BASEURL: https://deploy-preview-${{ github.event.number }}--${{ vars.NETLIFY_SITE_NAME }}.netlify.app/
        run: make docs-build   # outputs the minified site to docs/public
      - name: Deploy preview to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: docs/public
          alias: deploy-preview-${{ github.event.number }}
          deploy-message: "PR #${{ github.event.number }} (${{ github.sha }})"
          enable-pull-request-comment: true
          enable-commit-comment: false
          # Alias deploys are previews, never the production deploy.
          production-deploy: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
