name: preview-docs

# Deploys a per-PR preview of the Hugo docs site into pr-preview/pr-<N>/ on the
# gh-pages branch and comments the link on the PR. The preview is removed when
# the PR is closed. Requires Pages Source: "Deploy from a branch" -> gh-pages /
# (root), the same branch deploy-docs.yml publishes the live site to.
#
# Note: previews are only deployed for PRs from branches in this repository.
# Pull requests from forks get a read-only GITHUB_TOKEN, so the deploy/comment
# steps would fail; the pr-preview action skips them automatically.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write       # push the built preview to the gh-pages branch
  pull-requests: write  # post/update the preview-link comment

# One preview deploy per PR; newer pushes supersede in-flight builds.
concurrency:
  group: preview-docs-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        if: github.event.action != 'closed'
        with:
          go-version: '1.25'   # match the go directive in go.mod
          cache: true
      - uses: peaceiris/actions-hugo@v3
        if: github.event.action != 'closed'
        with:
          hugo-version: '0.163.3'
          extended: true
      - name: Build docs with preview baseURL
        if: github.event.action != 'closed'
        # Hugo reads HUGO_BASEURL as the baseURL config override, so links in
        # the preview resolve under the pr-preview/pr-<N>/ subpath.
        env:
          HUGO_BASEURL: https://abegong.github.io/katalyst/pr-preview/pr-${{ github.event.number }}/
        run: make docs-build   # outputs the minified site to docs/public
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: docs/public
          preview-branch: gh-pages
          umbrella-dir: pr-preview
