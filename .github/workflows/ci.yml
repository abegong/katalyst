name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'   # match the go directive in go.mod
          cache: true
      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Vet
        run: make vet
      - name: Test
        run: go test -race -count=1 ./...   # -race isn't in the Makefile target
      - name: Build
        run: make build                     # exercises the Makefile entry point
