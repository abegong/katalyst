name: deploy-docs

# Publishes the Hugo docs site to the `gh-pages` branch on every push to main.
# Pages must be configured with Source: "Deploy from a branch" -> gh-pages /
# (root) (Settings > Pages). PR previews (see preview-docs.yml) deploy into the
# pr-preview/ subdirectory of the same branch, so the main deploy excludes that
# directory when cleaning to avoid wiping live previews.
#
# The ci.yml `docs` job still validates the build on pull requests; this
# workflow only deploys from main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize every push to gh-pages. preview-docs.yml shares this group so a
# main deploy and a PR-preview deploy can never push (and trigger Pages builds)
# at the same time; racing pushes previously left Pages publishing a snapshot
# that omitted the just-deployed preview. Never cancel an in-progress publish.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'   # match the go directive in go.mod
          cache: true
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.3'
          extended: true
      - name: Build docs
        run: make docs-build   # outputs the minified site to docs/public
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/public
          branch: gh-pages
          # Wipe stale files on each deploy, but keep the PR previews that
          # preview-docs.yml publishes under pr-preview/.
          clean: true
          clean-exclude: pr-preview/
