name: deploy-docs

# Publishes the production docs site to GitHub Pages on every push to main.
#
# Pages Source is "GitHub Actions", so this workflow IS the deploy: it uploads
# the built site as a Pages artifact and calls the Pages deploy API. There is
# no `gh-pages` branch. Do NOT switch to a branch-push action — see the rationale
# and the three docs paths in .github/workflows/AGENTS.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege for a Pages-Actions deploy: read the repo, write a Pages
# deployment, and mint the OIDC token actions/deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'   # match the go directive in go.mod
          cache: true
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.3'
          extended: true
      - name: Build docs
        run: make docs-build   # outputs the minified site to docs/public
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
