# Dogfooding: katalyst checks its own Hugo docs (see issues #28, #29).
#
# The default storage instance: the local filesystem, rooted at the repo. It
# declares a single `pages` collection over the whole content tree.
type: filesystem
root: .
collections:
  pages:
    # One collection over the whole content tree. The `page` schema asserts the
    # contract common to every page type — content pages, section _index.md
    # files, and the generated check-type reference alike: a non-empty `title`,
    # with `weight`/`draft`/`bookCollapseSection`/`aliases` typed when present.
    path: docs/content
    pattern: "**/*.md"
    schema: page
    checks:
      - kind: filesystem_extension_in
        values: [.md]
    # Per-page-type enforcement via variants (#41). Section landing pages carry
    # `bookCollapseSection`; everything else is a content page that must declare
    # its sort `weight`. Section indexes are exempt — they match no variant and
    # run the base contract alone.
    #
    # Checks that single out a page type by *path* rather than frontmatter —
    # `markdown_requires_h1` (the generated reference pages under
    # check-types/ have no H1) or a kebab-case filename rule (every `_index.md`
    # would fail it) — still wait on #41's deferred path discrimination, so they
    # are not added here yet.
    variants:
      - when: "!bookCollapseSection"
        checks:
          - kind: object_required_field
            field: weight
